services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: CD_Grupo4
      MYSQL_USER: ticketing
      MYSQL_PASSWORD: ticketing1234
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: CD_Grupo4
      DB_USER: ticketing
      DB_PASSWORD: ticketing1234
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
