server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca se cachea: así el navegador siempre toma la última versión,
    # que referencia el bundle JS/CSS con hash actualizado (evita servir UI vieja cacheada).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # Los assets llevan hash en el nombre (index-<hash>.js): se pueden cachear de forma agresiva.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
